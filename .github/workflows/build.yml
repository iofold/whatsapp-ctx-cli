name: Build & Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-go:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install cross-compilation deps (Linux arm64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'windows' && '0' || '1' }}
        run: |
          cd whatsapp-sync
          BINARY_NAME="whatsapp-sync-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -o "../wactx/bin/${BINARY_NAME}" .
          ls -lh "../wactx/bin/${BINARY_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: wactx/bin/whatsapp-sync-*

  build-wheels:
    needs: build-go
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: manylinux_2_17_x86_64
            go_artifact: binary-linux-amd64
          - os: ubuntu-latest
            platform: manylinux_2_17_aarch64
            go_artifact: binary-linux-arm64
          - os: macos-latest
            platform: macosx_11_0_x86_64
            go_artifact: binary-darwin-amd64
          - os: macos-latest
            platform: macosx_11_0_arm64
            go_artifact: binary-darwin-arm64
          - os: windows-latest
            platform: win_amd64
            go_artifact: binary-windows-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.go_artifact }}
          path: wactx/bin/

      - name: Make binary executable
        if: matrix.os != 'windows-latest'
        run: chmod +x wactx/bin/*

      - name: Also copy as generic name
        shell: bash
        run: |
          cd wactx/bin
          for f in whatsapp-sync-*; do
            if [ "$f" != "whatsapp-sync" ] && [ "$f" != "whatsapp-sync.exe" ]; then
              cp "$f" "whatsapp-sync${f##*sync-*-*}"  2>/dev/null || cp "$f" whatsapp-sync
            fi
          done
          ls -la

      - name: Build wheel
        shell: bash
        run: |
          pip install build setuptools setuptools-scm wheel
          VERSION="${GITHUB_REF_NAME#v}"
          SETUPTOOLS_SCM_PRETEND_VERSION="$VERSION" python -m build --wheel

      - name: Rename wheel for platform
        shell: bash
        run: |
          cd dist
          for whl in *.whl; do
            new_name=$(echo "$whl" | sed "s/py3-none-any/${{ matrix.platform }}/")
            if [ "$new_name" != "$whl" ]; then
              mv "$whl" "$new_name"
            fi
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
